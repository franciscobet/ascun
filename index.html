<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario ASCUN Bogotá - U. Sergio Arboleda</title>
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sergio-blue: #0A3D91;
            --sergio-gold: #D4AF37;
            --bg-color: #f4f6f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: #333;
        }

        header {
            background-color: var(--sergio-blue);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--sergio-gold);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0;
            font-weight: 800;
            font-size: 2rem;
            text-transform: uppercase;
        }

        p.subtitle {
            margin: 5px 0 0 0;
            color: #cbd5e1;
            font-size: 1rem;
        }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        #calendar {
            max-width: 100%;
            margin: 0 auto;
        }

        /* Customizing Calendar Events */
        .fc-event {
            background-color: var(--sergio-blue);
            border: 1px solid var(--sergio-gold);
            color: white;
            border-radius: 4px;
            padding: 2px 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .fc-event:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 10px rgba(10, 61, 145, 0.4);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .close {
            color: #aaa;
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover,
        .close:focus {
            color: var(--sergio-blue);
            text-decoration: none;
        }

        #modal-title {
            color: var(--sergio-blue);
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--sergio-gold);
            padding-bottom: 10px;
        }

        .modal-info {
            margin: 15px 0;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .modal-info strong {
            color: #555;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>ASCUN Deportes Bogotá</h1>
        <p class="subtitle">Fixture Oficial - Universidad Sergio Arboleda</p>
        <button id="notifyBtn"
            style="background: linear-gradient(135deg, var(--sergio-gold), #b5952f); color: var(--sergio-blue); font-family: 'Montserrat', sans-serif; border: none; padding: 10px 20px; font-size: 0.9rem; font-weight: 800; border-radius: 20px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transition: all 0.3s ease; margin-top: 15px; display: inline-flex; align-items: center; gap: 8px;">🔔
            Activar Alertas de Partidos</button>
    </header>

    <main>
        <div id='calendar'></div>
    </main>

    <footer>
        <p>Datos actualizados automáticamente desde ASCUN Deportes mediante GitHub Actions.</p>
    </footer>

    <!-- The Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Detalle del Partido</h2>
            <div class="modal-info">
                <p><strong>🕒 Fecha y Hora:</strong> <span id="modal-time"></span></p>
                <p><strong>📍 Lugar:</strong> <span id="modal-location"></span></p>
                <p><strong>ℹ️ Detalles:</strong> <span id="modal-desc"></span></p>
            </div>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Permission Logic
            const notifyBtn = document.getElementById('notifyBtn');

            if ('serviceWorker' in navigator && 'Notification' in window) {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.error('Service Worker Registration Failed!', err));

                notifyBtn.addEventListener('click', () => {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            alert("¡Las alertas para el Torneo ASCUN están activadas! Recibirás avisos horas antes de cada partido de La Sergio.");
                            notifyBtn.style.display = 'none';

                            // Send welcome notification
                            new Notification("Alertas ASCUN Activas", {
                                body: "Bot programado exitosamente. La Sergio Arboleda te necesita.",
                                icon: "https://bogotaclausura2610.ascundeportes.org/uploads/c8ddd89739431c7edb933831ce2c89bd23f1e0f7.jpg"
                            });
                        } else {
                            alert("Permisos denegados. No podremos avisarte de los partidos.");
                        }
                    });
                });

                if (Notification.permission === 'granted') {
                    notifyBtn.style.display = 'none';
                }
            } else {
                notifyBtn.style.display = 'none';
            }

            var calendarEl = document.getElementById('calendar');
            var modal = document.getElementById("eventModal");
            var span = document.getElementsByClassName("close")[0];

            // Setup Calendar
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listWeek'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana',
                    list: 'Lista'
                },
                navLinks: true,
                dayMaxEvents: true,
                events: function (fetchInfo, successCallback, failureCallback) {
                    // Fetch directly from our local data.json which is updated by GitHub Actions
                    fetch('data.json')
                        .then(response => response.json())
                        .then(data => {
                            // Map custom JSON to FullCalendar Event Objects
                            let events = data.map(item => ({
                                title: item.title,
                                start: item.start,
                                end: item.end || null,
                                extendedProps: {
                                    location: item.location || 'Sede por confirmar',
                                    description: item.raw_text || 'Partido oficial ASCUN Módulo Bogotá.'
                                }
                            }));
                            successCallback(events);
                        })
                        .catch(err => {
                            console.error('Error fetching data.json', err);
                            failureCallback(err);
                        });
                },
                eventClick: function (info) {
                    // Prevent default URL behavior if any
                    info.jsEvent.preventDefault();

                    // Populate Modal
                    document.getElementById('modal-title').innerText = info.event.title;

                    // Format Date
                    let dateStr = info.event.start.toLocaleDateString('es-CO', {
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    document.getElementById('modal-time').innerText = dateStr;
                    document.getElementById('modal-location').innerText = info.event.extendedProps.location;
                    document.getElementById('modal-desc').innerText = info.event.extendedProps.description;

                    // Show Modal
                    modal.style.display = "block";
                }
            });

            calendar.render();

            // Close Modal Logic
            span.onclick = function () {
                modal.style.display = "none";
            }
            window.onclick = function (event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
        });
    </script>
</body>

</html>
