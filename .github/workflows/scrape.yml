name: Scrape ASCUN Calendar Daily

on:
  schedule:
    - cron: '0 8 * * *' # Run every day at 08:00 UTC
  workflow_dispatch: # Allow manual trigger

# CRITICAL: grant write access so the bot can push data.json back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Wait Random Jitter
        run: |
          echo "Esperando tiempo aleatorio para evitar detección..."
          sleep $((RANDOM % 120 + 10))

      - name: Run scraper
        run: |
          python scrape.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "AI Scraper Bot"
          git config --global user.email "bot@vibe.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update ASCUN Calendar Data"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
