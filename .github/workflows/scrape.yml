name: Scrape ASCUN Calendar Daily

on:
  schedule:
    - cron: '0 8 * * *' # Run every day at 08:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrape.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "AI Scraper Bot"
          git config --global user.email "bot@vibe.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ASCUN Calendar Data" && git push)
